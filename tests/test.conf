NUM_NODES=3
POOL_SIZE=128M

# ── operation mode ────────────────────────────────────────
# DISTRIBUTED=true   → nodes are real machines, init.sh uses root SSH
# DISTRIBUTED=false  → simulated: all nodes local, ramdisk
DISTRIBUTED=false

# ── ZEP settings ──────────────────────────────────────────
CHAIN="node1,node2,node3"
POLICY="fail"

# ── ZFS settings ──────────────────────────────────────────
ZFS_FORCE="false"
ZFS_RAW="false"
ZFS_RESUME="false"
ZFS_THROTTLE="64k"

# ── SMTP settings ─────────────────────────────────────────
SMTP_FROM="zep@local"
SMTP_HOST="127.0.0.1"
SMTP_PASSWORD="none"
SMTP_PORT="1025"
SMTP_PROTOCOL="smtp"
SMTP_STARTTLS="false"
SMTP_TO="admin@local"
SMTP_USER="none"

# ── Alert settings ────────────────────────────────────────
ALERT_CRITICAL_THRESHOLD="0"
ALERT_WARN_THRESHOLD="0"
ALERT_INFO_THRESHOLD="0"

# ═══════════════════════════════════════════════════════════
# ── Distributed mode node definitions ────────────────────
# ═══════════════════════════════════════════════════════════
# When DISTRIBUTED=true, init.sh uses these settings to
# provision each node via root SSH.
#
# Required: NODE<n>_FQDN (IP or hostname)
# Optional: NODE<n>_POOL, NODE<n>_DS, NODE<n>_USER
#           (defaults: zep-node-<n>, zep-node-<n>/test-<n>, zep-user-<n>)
# Optional: NODE<n>_POOL_DEVICE (/dev/...) — if unset, pool must already exist
#
# Network DNS: ensure zep-node-<n>.local resolves to each node.
# Root SSH:    init.sh runner must have passwordless root SSH to all nodes.
# Sudo:        each zep-user needs passwordless sudo for:
#              zfs allow, zfs unallow, zpool export, zpool import
#              (for test script; init.sh uses root directly)
#
# Example:
#   DISTRIBUTED=true
#   NODE1_FQDN=10.0.31.1
#   NODE1_POOL_DEVICE=/dev/sdb
#   NODE2_FQDN=10.0.31.2
#   NODE2_POOL_DEVICE=/dev/sdb
#   NODE3_FQDN=10.0.31.3
#   NODE3_POOL_DEVICE=/dev/sdb
#
#   NODE1_FQDN=10.0.31.1
#   NODE1_POOL=zep-node-1
#   NODE1_DS=zep-node-1/test-1
#   NODE1_USER=zep-user-1
#   NODE2_FQDN=10.0.31.2
#   NODE2_POOL=zep-node-2
#   NODE2_DS=zep-node-2/test-2
#   NODE2_USER=zep-user-2
#   NODE3_FQDN=10.0.31.3
#   NODE3_POOL=zep-node-3
#   NODE3_DS=zep-node-3/test-3
#   NODE3_USER=zep-user-3
